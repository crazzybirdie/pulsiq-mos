<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#131614">
<title>Мужская операционная система</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#131614;--surface:#1b201d;--surface2:#202621;--line:#2a312b;--line2:#374038;
    --ink:#e9efe8;--ink2:#aeb8ad;--mute:#7f8a80;--mint:#4cd2a8;--lime:#bfe85a;
    --radius:18px;--shadow:0 1px 0 rgba(255,255,255,.03) inset,0 18px 40px -26px rgba(0,0,0,.85);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:'Inter',sans-serif;color:var(--ink);background:radial-gradient(900px 500px at 8% -10%,rgba(191,232,90,.07),transparent 58%),radial-gradient(700px 560px at 108% 0%,rgba(76,210,168,.07),transparent 55%),var(--bg);min-height:100vh}
  .app{display:flex;min-height:100vh;max-width:1280px;margin:0 auto}
  .side{width:248px;flex:0 0 auto;border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:18px;padding:0 6px}
  .glyph{width:42px;height:42px;border-radius:13px;background:linear-gradient(150deg,#222a23,#161a17);border:1px solid var(--line2);display:grid;place-items:center;flex:0 0 auto}
  .glyph i{display:block;width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:12px 0 var(--lime),0 12px var(--lime),12px 12px var(--mint);margin:-6px 0 0 -6px}
  .brand h1{font-family:'Unbounded',sans-serif;font-weight:700;font-size:13px;line-height:1.15}
  .brand p{font-size:10.5px;color:var(--mute);margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--ink2);font-size:14px;cursor:pointer;text-decoration:none;transition:.12s}
  .nav a .d{width:7px;height:7px;border-radius:50%;background:#3a443c;flex:0 0 auto;transition:.12s}
  .nav a:hover{background:var(--surface);color:var(--ink)}
  .nav a.active{background:linear-gradient(120deg,rgba(76,210,168,.14),rgba(191,232,90,.06));color:var(--ink);border:1px solid rgba(76,210,168,.25)}
  .nav a.active .d{background:var(--mint);box-shadow:0 0 8px var(--mint)}
  .side .foot{margin-top:auto;display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line2);border-radius:13px;background:var(--surface2)}
  .side .dial{width:46px;height:46px;flex:0 0 auto}
  .side .stk b{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--lime);line-height:1}
  .side .stk small{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:1px}
  .dial .face{fill:url(#fg);stroke:var(--line2);stroke-width:1}
  .dial .tick{stroke:#5b6a5d;stroke-width:1.4}.dial .tickM{stroke:#86977f;stroke-width:2.4}
  .hh{stroke:var(--ink);stroke-width:3.4;stroke-linecap:round}.mh{stroke:var(--mint);stroke-width:2.6;stroke-linecap:round}
  .sh{stroke:var(--lime);stroke-width:1.5;stroke-linecap:round}.cap{fill:var(--lime)}
  .main{flex:1;min-width:0;padding:30px clamp(18px,3vw,40px) 110px}
  .viewhead{margin-bottom:22px}
  .viewhead h2{font-family:'Unbounded',sans-serif;font-weight:700;font-size:25px;line-height:1.15}
  .viewhead p{font-size:13px;color:#566057;margin-top:6px;max-width:620px;line-height:1.5}
  .card{background:linear-gradient(168deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
  .ttl{font-family:'Unbounded',sans-serif;font-weight:600;font-size:14px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .lab{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:7px}
  .hint{font-size:12px;color:#566057;margin-top:9px;line-height:1.45}
  .field{outline:none;font-size:15px;color:var(--ink);line-height:1.45;padding:12px 14px;border:1px solid var(--line2);border-radius:11px;background:rgba(0,0,0,.18);min-height:46px;cursor:text}
  .field:focus{border-color:var(--mint);background:rgba(76,210,168,.05)}
  .field:empty:before{content:attr(data-ph);color:var(--mute)}
  .field.big{font-family:'Unbounded',sans-serif;font-weight:600;font-size:16px}
  .dayhead{font-family:'Unbounded',sans-serif;font-weight:600;font-size:16px;margin:20px 0 11px;display:flex;align-items:center;gap:9px}
  .dayhead::before{content:"";width:4px;height:18px;border-radius:3px;background:var(--lime)}
  .do{display:flex;align-items:center;gap:13px;padding:15px;border:1px solid rgba(76,210,168,.4);border-radius:13px;background:linear-gradient(120deg,rgba(76,210,168,.10),rgba(191,232,90,.05))}
  .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--mint);flex:0 0 auto;display:grid;place-items:center;cursor:pointer;transition:.15s}
  .box svg{width:13px;height:13px;opacity:0;transition:.15s}.do.on .box{background:var(--mint)}.do.on .box svg{opacity:1}
  .do .field{flex:1;border:none;background:transparent;padding:0;min-height:auto;font-size:16px;font-weight:500}
  .addrow{display:flex;gap:8px;margin-top:11px}
  .addrow input{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;color:var(--ink);font-size:14px;font-family:'Inter',sans-serif;outline:none}
  .addrow input:focus{border-color:var(--mint)}
  .addrow button{padding:0 16px;border:1px solid var(--line2);border-radius:10px;background:rgba(76,210,168,.12);color:var(--mint);font-size:20px;cursor:pointer}
  .li{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .li:last-child{border-bottom:none}
  .li .cbox{width:19px;height:19px;border-radius:6px;border:2px solid var(--mint);flex:0 0 auto;cursor:pointer}
  .li.done .cbox{background:var(--mint)}.li.done .tx{color:var(--mute);text-decoration:line-through}
  .li .tx{flex:1;font-size:14px}
  .li .ord{display:flex;flex-direction:column;gap:1px}
  .li .ord button{background:none;border:none;color:var(--mute);cursor:pointer;font-size:10px;line-height:1;padding:1px}
  .li .ord button:hover{color:var(--mint)}
  .li .del{background:none;border:none;color:var(--mute);font-size:18px;cursor:pointer;padding:0 3px}
  .li .num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--lime);width:16px;flex:0 0 auto}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{display:flex;align-items:center;gap:8px;padding:9px 13px;border:1px solid var(--line2);border-radius:12px;background:rgba(0,0,0,.16);font-size:13px;cursor:pointer;user-select:none}
  .chip i{width:9px;height:9px;border-radius:50%;background:#3a443c}
  .chip.on{background:rgba(76,210,168,.10);border-color:rgba(76,210,168,.4)}.chip.on i{background:var(--mint)}
  .chip .s{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--lime)}
  .chip .x{color:var(--mute);font-size:15px;margin-left:2px}
  .weeks{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin:12px 0}
  .wk{aspect-ratio:1;border:1px solid var(--line2);border-radius:6px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mute);cursor:pointer}
  .wk.done{background:rgba(76,210,168,.18);border-color:rgba(76,210,168,.4);color:var(--ink2)}
  .wk.now{background:linear-gradient(120deg,var(--mint),var(--lime));color:#10130e;border-color:transparent;font-weight:700}
  .bar{height:6px;border-radius:99px;background:rgba(0,0,0,.35);overflow:hidden}.bar div{height:100%;background:linear-gradient(90deg,var(--mint),var(--lime))}
  .fuelrow{display:flex;gap:9px}
  .fc{flex:1;text-align:center;padding:12px 6px;border:1px solid var(--line2);border-radius:12px;background:rgba(0,0,0,.16);cursor:pointer;font-size:12.5px;user-select:none}
  .fc.on{background:rgba(191,232,90,.10);border-color:rgba(191,232,90,.4)}
  .fc .ic{font-size:23px;line-height:1;margin-bottom:5px}.fc.on .ic{color:var(--lime)}
  .sph{margin-bottom:13px}
  .sph .r{display:flex;justify-content:space-between;font-size:13px;color:var(--ink2);margin-bottom:6px}
  .sph.weak .r span:first-child{color:var(--lime);font-weight:600}
  .sph .v{font-family:'JetBrains Mono',monospace;color:var(--ink)}
  input[type=range]{-webkit-appearance:none;width:100%;height:7px;border-radius:99px;background:rgba(0,0,0,.35);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--mint);border:2px solid #11140f;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--mint);border:2px solid #11140f;cursor:pointer}
  .wheelwrap{display:flex;justify-content:center;padding:10px 0 4px}
  .wheel{width:380px;max-width:100%}
  .wheel text{font-family:'Inter',sans-serif;font-size:7.6px;fill:var(--ink2)}
  .wheel .ring{fill:none;stroke:var(--line);stroke-width:.6}
  .focuschip{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1px solid var(--line2);border-radius:11px;background:rgba(0,0,0,.16);font-size:12.5px;cursor:pointer;user-select:none}
  .focuschip.on{background:linear-gradient(120deg,rgba(76,210,168,.14),rgba(191,232,90,.08));border-color:rgba(76,210,168,.45);color:var(--ink)}
  .focuschip.sugg{border-color:rgba(191,232,90,.5)}
  .fstep{margin-top:10px}
  .fstep .fh{font-size:12.5px;color:var(--lime);margin-bottom:6px;font-weight:600}
  .weaklink{display:flex;gap:11px;align-items:flex-start;padding:13px;border:1px solid var(--line2);border-radius:12px;background:rgba(191,232,90,.06);margin-top:6px}
  .weaklink .dot{width:8px;height:8px;border-radius:50%;background:var(--lime);margin-top:5px;flex:0 0 auto}
  .weaklink p{font-size:12.5px;color:var(--ink2);line-height:1.5}.weaklink b{color:var(--ink)}
  .horizon{border-left:2px solid var(--line2);padding-left:16px;margin-bottom:18px}
  .horizon .yr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--lime);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .proto .pintro{font-size:14px;color:var(--ink);line-height:1.6;margin-bottom:6px}
  .proto h4{font-family:'Unbounded',sans-serif;font-weight:600;font-size:13px;margin:15px 0 5px;color:var(--mint)}
  .proto p{font-size:13.5px;color:var(--ink2);line-height:1.6}
  .proto .now{border:1px solid rgba(76,210,168,.35);border-radius:11px;padding:13px;background:rgba(76,210,168,.07);font-size:13px;color:var(--ink);margin-top:16px;line-height:1.55}
  .acc{border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden;background:rgba(0,0,0,.1)}
  .acc-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
  .acc-h .an{font-weight:600;font-size:13.5px}
  .acc-h .ac{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute);display:flex;align-items:center;gap:9px}
  .acc-h .ar{transition:.2s;color:var(--lime);font-size:14px}
  .acc.open .ar{transform:rotate(90deg)}
  .acc-b{display:none;padding:0 16px 16px}
  .acc.open .acc-b{display:block}
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .cal-head span{font-family:'Unbounded',sans-serif;font-weight:600;font-size:14px}
  .cal-head button{background:none;border:1px solid var(--line2);border-radius:9px;color:var(--ink2);width:32px;height:32px;cursor:pointer;font-size:16px}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
  .cal-dow span{text-align:center;font-size:10px;color:var(--mute);font-family:'JetBrains Mono',monospace}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12.5px;color:var(--ink2);border-radius:9px;border:1px solid transparent}
  .cd.empty{border:none}.cd i{width:5px;height:5px;border-radius:50%;background:transparent;margin-top:2px}
  .cd.done i{background:var(--lime)}.cd.today{border-color:var(--mint);color:var(--ink);font-weight:700}
  .entry{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .entry .dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--lime);flex:0 0 70px;padding-top:2px}
  .entry .vv{font-size:13.5px;color:var(--ink2);line-height:1.45}
  .closebtn{width:100%;padding:16px;border:none;border-radius:14px;cursor:pointer;font-family:'Unbounded',sans-serif;font-weight:600;font-size:15px;color:#10130e;background:linear-gradient(120deg,var(--mint),var(--lime));box-shadow:0 12px 30px -14px rgba(76,210,168,.6);margin-bottom:8px}
  .closebtn:active{transform:translateY(1px)}
  .topbar,.botnav{display:none}
  .scheme{width:100%;max-width:520px;display:block;margin:8px 0 18px;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.18);padding:8px}
  .scheme text{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--mute)}
  .proto .phabs{margin-top:16px}
  .proto .phlab{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);margin-bottom:10px}
  .proto .points{display:flex;flex-direction:column;gap:14px;margin-top:4px}
  .proto .pt{display:flex;gap:12px}
  .proto .pt .mk{width:6px;border-radius:3px;background:linear-gradient(var(--mint),var(--lime));flex:0 0 auto}
  .proto .pt h4{margin:0 0 4px}
  .proto .pt p{margin:0}
  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;margin-top:4px}
  .board .ph{aspect-ratio:1;border-radius:12px;background-size:cover;background-position:center;border:1px solid var(--line2);position:relative}
  .board .ph .rm{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.62);color:#fff;border:none;border-radius:7px;width:24px;height:24px;cursor:pointer;font-size:15px;line-height:1}
  .board .add{aspect-ratio:1;border:1px dashed var(--line2);border-radius:12px;display:grid;place-items:center;cursor:pointer;color:var(--mute);font-size:13px;text-align:center;padding:8px}
  .board .add span{font-size:26px;display:block;margin-bottom:3px;color:var(--mint)}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:12px}
  .pcard{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface2)}
  .pcard .cover{height:104px;background-size:cover;background-position:center;display:grid;place-items:center;cursor:pointer;color:var(--mute);font-size:11px;border-bottom:1px solid var(--line);text-align:center;padding:8px}
  .pcard .pb{padding:12px;display:flex;align-items:center;gap:10px}
  .pcard .pb .cbox{width:18px;height:18px;border-radius:6px;border:2px solid var(--mint);flex:0 0 auto;cursor:pointer}
  .pcard.done .cbox{background:var(--mint)}.pcard.done .tx{color:var(--mute);text-decoration:line-through}
  .pcard .pb .tx{flex:1;font-size:13.5px;outline:none}
  .pcard .pb .del{background:none;border:none;color:var(--mute);font-size:18px;cursor:pointer}
  .psteps{padding:0 12px 12px}
  .slab{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin:0 0 7px}
  .sli{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line)}
  .sli:last-child{border-bottom:none}
  .scb{width:16px;height:16px;border-radius:5px;border:2px solid var(--mint);flex:0 0 auto;cursor:pointer}
  .sli.done .scb{background:var(--mint)}.sli.done .stx{color:var(--mute);text-decoration:line-through}
  .stx{flex:1;font-size:12.5px;outline:none}
  .saddrow{display:flex;gap:7px;margin-top:9px}
  .saddrow input{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--line2);border-radius:9px;padding:8px 10px;color:var(--ink);font-size:12.5px;font-family:'Inter',sans-serif;outline:none}
  .saddrow button{width:36px;border:1px solid var(--line2);border-radius:9px;background:rgba(76,210,168,.12);color:var(--mint);font-size:17px;cursor:pointer}
  .pmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:0 12px 12px}
  .pmeta select,.pmeta input[type=date]{background:rgba(0,0,0,.2);border:1px solid var(--line2);border-radius:9px;padding:7px 9px;color:var(--ink2);font-size:12px;font-family:'Inter',sans-serif;outline:none;color-scheme:dark}
  .pmeta select:focus,.pmeta input[type=date]:focus{border-color:var(--mint)}
  .pmeta select option{background:#1b201d;color:#e9efe8}
  .pweak{font-family:'JetBrains Mono',monospace;font-size:10px;color:#10130e;background:var(--lime);border-radius:7px;padding:4px 8px}
  .pcycle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute)}
  .spush{background:none;border:1px solid var(--line2);border-radius:8px;color:var(--mint);font-size:11px;cursor:pointer;padding:4px 8px;white-space:nowrap;flex:0 0 auto}
  .spush:hover{border-color:var(--mint)}
  .wkrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .wkrow:last-child{border-bottom:none}
  .wkrow .scb{width:18px;height:18px;border-radius:5px;border:2px solid var(--mint);flex:0 0 auto;cursor:pointer}
  .wkrow.done .scb{background:var(--mint)}.wkrow.done .nm{color:var(--mute);text-decoration:line-through}
  .wkrow .nm{flex:1;font-size:14px;outline:none}
  .wkrow .reps{width:96px;background:rgba(0,0,0,.2);border:1px solid var(--line2);border-radius:8px;padding:7px 8px;color:var(--ink);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none}
  .wkrow .reps:focus{border-color:var(--mint)}
  .wkrow .del{background:none;border:none;color:var(--mute);font-size:18px;cursor:pointer}
  .wktabs{display:flex;gap:6px}
  .wktab{flex:1;padding:10px 0;border:1px solid var(--line2);border-radius:9px;background:rgba(0,0,0,.16);color:var(--ink2);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;position:relative}
  .wktab.on{background:linear-gradient(120deg,var(--mint),var(--lime));color:#10130e;border-color:transparent;font-weight:700}
  .wktab.today::after{content:"";position:absolute;top:5px;right:7px;width:5px;height:5px;border-radius:50%;background:var(--lime)}
  .wktab.on.today::after{background:#10130e}
  .sharebtn{width:100%;padding:15px;border:1px solid rgba(76,210,168,.45);border-radius:14px;cursor:pointer;font-family:'Unbounded',sans-serif;font-weight:600;font-size:14px;color:var(--mint);background:rgba(76,210,168,.08);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:9px}
  .sharebtn:active{transform:translateY(1px)}
  .csel{position:relative;min-width:160px}
  .csel-val{background:rgba(0,0,0,.2);border:1px solid var(--line2);border-radius:9px;padding:7px 10px;color:var(--ink2);font-size:12px;cursor:pointer;white-space:nowrap}
  .csel.open .csel-val{border-color:var(--mint)}
  .csel-list{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:200px;z-index:12;background:#1b201d;border:1px solid var(--line2);border-radius:11px;padding:5px;max-height:260px;overflow:auto;box-shadow:0 18px 40px -16px rgba(0,0,0,.9)}
  .csel.open .csel-list{display:block}
  .csel-opt{padding:9px 11px;border-radius:8px;font-size:12.5px;color:var(--ink2);cursor:pointer;white-space:nowrap}
  .csel-opt:hover{background:rgba(76,210,168,.16);color:var(--ink)}
  .csel-opt.on{background:rgba(191,232,90,.12);color:var(--ink)}
  .cgoal{padding:12px 0;border-bottom:1px solid var(--line)}

  var PROTO={
    'Тестостерон':{intro:'Тестостерон это не только про либидо. Это драйв, мышцы, уверенность и тяга действовать. Он не падает сам, его роняет образ жизни. И поднимается он тоже не таблетками, а рычагами, которые ты дёргаешь каждый день.',points:[
      ['Сон это рычаг номер один','Одна неделя сна по пять часов роняет тестостерон у молодого мужчины на 10-15 процентов. Это как постареть на десять лет за семь ночей. Большая часть гормона вырабатывается именно во сне.'],

    'Дофамин':{intro:'Дофамин это не про удовольствие, это про охоту и желание. Он толкает тебя вставать и делать. Лента, шортсы, порно и сахар дают его дёшево и быстро, и за это мозг платит чувствительностью. Когда ничего не радует и тянет только в телефон, это не лень, это сожжённый дофамин.',points:[
      ['После всплеска идёт провал','За каждым быстрым пиком мозг роняет уровень ниже исходного. Вот почему после двух часов ленты всё кажется серым, а дела отвратительными.'],
      ['Рецепторы тупеют','Чем больше дешёвого дофамина, тем меньше радости от обычной жизни. Планка удовольствия ползёт вверх, и нормальные вещи перестают цеплять.'],
      ['Первый час дня решает всё','Если с порога зарядил мозг лентой, весь день будешь гнаться за этим уровнем, и спокойная работа покажется пыткой. Утро без экрана это перезагрузка.'],
      ['Награда после дела, а не до','Сначала действие, потом отдых и экран. Так мозг снова связывает кайф с усилием, а не с залипанием. Это перестройка проводки.'],
      ['Скука это лекарство','Сутки без быстрых стимулов поднимают чувствительность обратно. Будет ломать, это и есть процесс. На той стороне обычная жизнь снова даёт вкус.'],
      ['Чистый дофамин существует','Холод, спорт, природа, доведённое до конца дело дают длинный дофамин без обвала. Это топливо, которое не оставляет похмелья.']
    ],now:'Тридцать дней: первый час после подъёма без телефона, и никаких шортсов и порно. Сначала одно дело, потом награда. Через неделю вернётся вкус к простому.'},
    'Сон':{intro:'Сон это не пауза, это работа. Пока ты спишь, тело чинит мышцы, мозг чистит мусор, вырабатываются гормон роста и тестостерон. Плохой сон это не про усталость, это про то, что ремонт не случился. И чинится он средой и ритуалом, а не таблеткой.',points:[
      ['Сон идёт циклами по 90 минут','Просыпаться легче в конце цикла, а не в середине глубокой фазы. Считай отбой так, чтобы между засыпанием и подъёмом было кратное полутора часам. Тогда даже шесть часов ощущаются бодрее, чем семь невпопад.'],
      ['Первые часы самые ценные','Глубокая фаза, в которой чинится тело, идёт в начале ночи. Лёг в час вместо одиннадцати, потерял именно её, и никакой кофе утром это не вернёт.'],
      ['Тело должно остыть','Чтобы заснуть, температура тела падает. Прохладная комната около 18-19 градусов и тёплый душ за час до сна, после которого тело остывает, работают лучше любого снотворного.'],
      ['Свет вечером обманывает мозг','Яркий и синий свет говорит мозгу, что ещё день, и блокирует мелатонин. За час тёплый свет и подальше экран.'],
      ['Кофе живёт в тебе восемь часов','Чашка в четыре часа дня это половина дозы всё ещё в крови к полуночи. Ты заснёшь, но сон будет мельче.'],
      ['Алкоголь крадёт глубину','С ним вырубаешься быстрее, но он убивает глубокую фазу. Утром разбитость, даже если спал восемь часов.'],

  function wheelSVG(){

    [0.25,0.5,0.75,1].forEach(function(f){svg+='<circle class="ring" cx="120" cy="120" r="'+(R*f)+'"/>';});
    var min=Math.min.apply(null,s.spheres.map(function(x){return x.v;}));
    function pt(r,ang){var a=(ang-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
    s.spheres.forEach(function(sp,i){
      var a0=i*45,a1=(i+1)*45,rr=Math.max(R*0.06,sp.v/10*R);
      var p0=pt(rr,a0),p1=pt(rr,a1);
      var weak=sp.v===min;
      var fill=weak?'var(--lime)':'var(--mint)';var op=weak?0.5:(0.22+sp.v/10*0.4);
      svg+='<path d="M'+cx+' '+cy+' L'+p0[0].toFixed(1)+' '+p0[1].toFixed(1)+' A'+rr.toFixed(1)+' '+rr.toFixed(1)+' 0 0 1 '+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+' Z" fill="'+fill+'" fill-opacity="'+op.toFixed(2)+'" stroke="#13160f" stroke-width="1"/>';
      var f0=pt(R,a0);svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f0[0].toFixed(1)+'" y2="'+f0[1].toFixed(1)+'" stroke="var(--line2)" stroke-width=".6"/>';
      var lp=pt(R+13,a0+22.5);svg+='<text x="'+lp[0].toFixed(1)+'" y="'+lp[1].toFixed(1)+'" text-anchor="middle" dominant-baseline="middle">'+SHORT[i]+'</text>';
    });
    svg+='<circle cx="120" cy="120" r="3" fill="var(--lime)"/></svg>';
    return svg;
  }

    var c=document.createElement('div');c.className='card';var inner=document.createElement('div');c.appendChild(inner);
    var wheelBox=document.createElement('div');wheelBox.className='wheelwrap';wheelBox.id='wheel';c.appendChild(wheelBox);main.appendChild(c);
    var cf=document.createElement('div');cf.className='card';cf.innerHTML='<div class="ttl">Фокус недели</div><div class="weaklink" style="margin-bottom:14px"><div class="dot"></div><p id="sugg"></p></div><div class="hint" style="margin:0 0 11px">Выбери до трёх сфер. Одна это честнее и быстрее. Три, если реально тянешь несколько фронтов.</div><div class="chips" id="fchips"></div><div id="fsteps"></div></div>';main.appendChild(cf);
    function draw(){
      var min=Math.min.apply(null,s.spheres.map(function(x){return x.v;}));inner.innerHTML='';
      s.spheres.forEach(function(sp){var d=document.createElement('div');d.className='sph'+(sp.v===min?' weak':'');d.innerHTML='<div class="r"><span>'+sp.name+'</span><span class="v">'+sp.v+'</span></div>';var r=document.createElement('input');r.type='range';r.min=1;r.max=10;r.value=sp.v;r.oninput=function(){sp.v=+r.value;d.querySelector('.v').textContent=sp.v;};r.onchange=function(){draw();drawWheel();drawFocus();save();};d.appendChild(r);inner.appendChild(d);});
    }
    function drawWheel(){document.getElementById('wheel').innerHTML=wheelSVG();}
    function drawFocus(){
      var weak=weakSphere();var pj=s.projects.filter(function(p){return weak&&p.sphere===weak.name&&!p.done;}).map(function(p){return p.name;});document.getElementById('sugg').innerHTML='<b>Слабое звено: '+(weak?weak.name.toLowerCase():'')+'.</b> Система советует начать отсюда. Подтянешь сюда, вырастет всё.'+(pj.length?' Проекты сюда: '+pj.join(', ')+'.':'');
      var fc=document.getElementById('fchips');fc.innerHTML='';
      s.spheres.forEach(function(sp){var on=s.weekFocus.indexOf(sp.name)>=0;var c=document.createElement('div');c.className='focuschip'+(on?' on':'')+(weak&&weak.name===sp.name?' sugg':'');c.textContent=sp.name;c.onclick=function(){var i=s.weekFocus.indexOf(sp.name);if(i>=0){s.weekFocus.splice(i,1);}else{if(s.weekFocus.length>=3){toast('Максимум три фокуса. Больше распыляет.');return;}s.weekFocus.push(sp.name);}drawFocus();save();};fc.appendChild(c);});
      var fs=document.getElementById('fsteps');fs.innerHTML='';
      s.weekFocus.forEach(function(name){var d=document.createElement('div');d.className='fstep';d.innerHTML='<div class="fh">'+name+'</div><div class="field" contenteditable data-ph="Один шаг по этой сфере на неделю"></div>';var f=d.querySelector('.field');editable(f,function(){return s.focusSteps[name];},function(v){s.focusSteps[name]=v;});fs.appendChild(d);});
    }
    draw();drawWheel();drawFocus();
  }

  /* JOURNAL */
  var calDate=new Date();calDate.setDate(1);
  var MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  function vJournal(){
    main.innerHTML=head('Журнал','Твой путь по дням. Каждый закрытый день отмечается в календаре, а победа дня сохраняется записью ниже. Полоса '+s.streak+' дней.');
    var c=document.createElement('div');c.className='card';c.innerHTML='<div class="cal-head"><button id="cp">‹</button><span id="ctl"></span><button id="cn">›</button></div><div class="cal-dow"><span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span></div><div class="cal-grid" id="cg2"></div>';main.appendChild(c);
    var c2=document.createElement('div');c2.className='card';c2.innerHTML='<div class="ttl">Записи</div><div id="entries"></div>';main.appendChild(c2);
    drawCal();renderEntries();
    document.getElementById('cp').onclick=function(){calDate.setMonth(calDate.getMonth()-1);drawCal();};
    document.getElementById('cn').onclick=function(){calDate.setMonth(calDate.getMonth()+1);drawCal();};
  }
  function drawCal(){var y=calDate.getFullYear(),m=calDate.getMonth();var tl=document.getElementById('ctl');if(tl)tl.textContent=MN[m]+' '+y;var grid=document.getElementById('cg2');if(!grid)return;grid.innerHTML='';var start=(new Date(y,m,1).getDay()+6)%7,days=new Date(y,m+1,0).getDate(),today=new Date().toDateString();for(var i=0;i<start;i++){var e=document.createElement('div');e.className='cd empty';grid.appendChild(e);}for(var d=1;d<=days;d++){var c=document.createElement('div');c.className='cd';var ds=new Date(y,m,d).toDateString();if(ds===today)c.classList.add('today');if(s.closedDates.indexOf(ds)>=0)c.classList.add('done');c.innerHTML=d+'<i></i>';grid.appendChild(c);}}
  function renderEntries(){var w=document.getElementById('entries');if(!w)return;w.innerHTML='';var keys=Object.keys(s.entries).filter(function(k){var v=s.entries[k];return v&&(!Array.isArray(v)||v.length);}).sort(function(a,b){return new Date(b)-new Date(a);});if(!keys.length){w.innerHTML='<div class="hint">Пока пусто. Закрой день с победой, и она появится здесь.</div>';return;}keys.slice(0,30).forEach(function(k){var d=new Date(k);var lbl=d.getDate()+' '+MN[d.getMonth()].toLowerCase().slice(0,3);var v=s.entries[k];var html=Array.isArray(v)?v.map(esc).join('<br>'):esc(v);var e=document.createElement('div');e.className='entry';e.innerHTML='<div class="dt">'+lbl+'</div><div class="vv">'+html+'</div>';w.appendChild(e);});}

  function closeDay(){
    var today=new Date().toDateString();
    if(s.lastClosed===today){toast('День уже закрыт. Полоса: '+s.streak);return;}
    s.habits.forEach(function(h){if(h.on){h.s++;h.on=false;}});
    s.tasks.forEach(function(t){t.done=false;});
    s.weekWorkout[curDay()].forEach(function(e){e.done=false;});
    if(s.dayVictories.length)s.entries[today]=s.dayVictories.slice();
    s.dayVictories=[];s.fuel={sleep:false,water:false,move:false};s.focusDone=false;
    s.streak++;s.lastClosed=today;if(s.closedDates.indexOf(today)<0)s.closedDates.push(today);
    save();updateStreak();toast('День закрыт. Полоса: '+s.streak);render();
  }
  function updateStreak(){var d=document.getElementById('streakD');if(d)d.textContent=s.streak;var m=document.getElementById('streakM');if(m)m.textContent=s.streak;}
  function bestStreak(){
    var set={};(s.closedDates||[]).forEach(function(d){set[new Date(d).toDateString()]=1;});
    var best=0,cur=0,probe=new Date();probe.setDate(probe.getDate()-400);
    for(var i=0;i<460;i++){var k=probe.toDateString();if(set[k]){cur++;if(cur>best)best=cur;}else{cur=0;}probe.setDate(probe.getDate()+1);}
    return Math.max(best,s.streak||0);
  }
  function renderStreakGrid(){
    var g=document.getElementById('streakGrid');if(!g)return;
    var set={};(s.closedDates||[]).forEach(function(d){set[new Date(d).toDateString()]=1;});
    var today=new Date().toDateString();
    var cells=28,html='';
    for(var i=cells-1;i>=0;i--){
      var dt=new Date();dt.setDate(dt.getDate()-i);var k=dt.toDateString();
      var cls=k===today?'today':(set[k]?'on':'');
      html+='<i class="'+cls+'"></i>';
    }
    g.innerHTML=html;
    var nb=document.getElementById('streakNum');if(nb)nb.textContent=s.streak;
    var rb=document.getElementById('streakRec');if(rb)rb.textContent='рекорд '+bestStreak();
  }
  function toast(t){var el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},2300);}
  function shareDay(){
    var W=1080,H=1560,PAD=88;var cv=document.createElement('canvas');cv.width=W;cv.height=H;var x=cv.getContext('2d');
    function rr(x0,y0,w,h,r){x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath();}
    function draw(){
      x.fillStyle='#000000';x.fillRect(0,0,W,H);
      var g=x.createRadialGradient(540,H-250,0,540,H-250,800);g.addColorStop(0,'rgba(76,210,168,.15)');g.addColorStop(1,'rgba(76,210,168,0)');x.fillStyle=g;x.fillRect(0,0,W,H);
      x.textBaseline='alphabetic';x.textAlign='left';
      function ls(v){try{x.letterSpacing=v;}catch(e){}}
      x.font='800 52px Unbounded, sans-serif';x.fillStyle='#ffffff';x.fillText('PULS',PAD,130);
      var lw=x.measureText('PULS').width;x.fillStyle='#4cd2a8';x.fillText('IQ',PAD+lw+4,130);
      ls('3px');x.font='600 22px Inter, sans-serif';x.fillStyle='#7f8a80';x.fillText('СИСТЕМА МУЖСКОЙ ДИСЦИПЛИНЫ',PAD,172);ls('0px');
      x.font='800 150px Unbounded, sans-serif';x.fillStyle='#ffffff';x.fillText('День '+s.streak,PAD,360);
      ls('1px');x.font='600 24px Inter, sans-serif';x.fillStyle='#4cd2a8';x.fillText('БЕЗ ПРОПУСКОВ',PAD,432);ls('0px');
      var d=new Date();x.font='500 30px Inter, sans-serif';x.fillStyle='#8a948b';x.fillText(d.getDate()+' '+MN[d.getMonth()].toLowerCase()+' '+d.getFullYear(),PAD,478);
      var y=560;
      function row(label,done){
        if(done){x.strokeStyle='#4cd2a8';x.lineWidth=6;x.lineCap='round';x.beginPath();x.moveTo(PAD+4,y-10);x.lineTo(PAD+16,y+2);x.lineTo(PAD+40,y-28);x.stroke();}
        else{x.strokeStyle='#4a544a';x.lineWidth=5;x.lineCap='round';x.beginPath();x.moveTo(PAD+6,y-26);x.lineTo(PAD+34,y+4);x.moveTo(PAD+34,y-26);x.lineTo(PAD+6,y+4);x.stroke();}
        var maxw=W-(PAD+66)-PAD,fs=33;x.font='500 '+fs+'px Inter, sans-serif';var tw=x.measureText(label).width;if(tw>maxw){fs=Math.max(20,Math.floor(fs*maxw/tw));x.font='500 '+fs+'px Inter, sans-serif';}
        x.fillStyle=done?'#e9efe8':'#7f8a80';x.fillText(label,PAD+66,y);y+=58;
      }
      function fitText(t,px,py,base,color){var maxw=W-px-PAD,fs=base;x.font='500 '+fs+'px Inter, sans-serif';var tw=x.measureText(t).width;if(tw>maxw){fs=Math.max(20,Math.floor(fs*maxw/tw));x.font='500 '+fs+'px Inter, sans-serif';}x.fillStyle=color;x.fillText(t,px,py);}
      function header(txt){y+=30;ls('1.5px');x.font='800 33px Unbounded, sans-serif';x.fillStyle='#4cd2a8';x.fillText(txt,PAD,y);ls('0px');y+=58;}
      var phys=['Подтягивания','Отжимания','Приседания','Планка','Пресс','Берпи','Зарядка утром','Кардио 20 минут','Тренировка ног','Вис на турнике минуту','Растяжка 5 минут','Растяжка тела'];
      function isPhys(n){return phys.indexOf(n)>=0;}
      if(s.focus)row('Фокус: '+s.focus,s.focusDone);
      row('Сон 7-8 часов',s.fuel.sleep);row('Вода',s.fuel.water);row('Движение',s.fuel.move);
      s.habits.filter(function(h){return !isPhys(h.name);}).slice(0,5).forEach(function(h){row(h.name,h.on);});
      var twk=s.weekWorkout[curDay()];var ph=s.habits.filter(function(h){return isPhys(h.name);});
      if(twk.length||ph.length){header('💪 ТРЕНИРОВКА');ph.forEach(function(h){row(h.name,h.on);});twk.slice(0,6).forEach(function(e){row(e.name+(e.reps?'   '+e.reps:''),e.done);});}
      if(s.dayVictories.length){header('🏆 ПОБЕДЫ ДНЯ');s.dayVictories.slice(0,3).forEach(function(v){x.fillStyle='#4cd2a8';x.beginPath();x.arc(PAD+9,y-12,7,0,7);x.fill();fitText(v,PAD+38,y,31,'#aeb8ad');y+=52;});}
      ls('1px');x.font='500 22px Inter, sans-serif';x.fillStyle='#6f7a72';x.fillText('сделано в Мужской операционной системе',PAD,H-96);ls('0px');
      x.font='600 31px Unbounded, sans-serif';x.fillStyle='#ffffff';x.fillText('Перестань договариваться с собой',PAD,H-50);
      exportCard(cv);
    }
    if(document.fonts&&document.fonts.load){Promise.all(['800 150px Unbounded','600 31px Unbounded','700 28px Inter','600 22px Inter','500 30px Inter'].map(function(f){return document.fonts.load(f);})).then(draw).catch(draw);setTimeout(function(){if(!cv._done)draw();},900);}else{draw();}
  }
  function exportCard(cv){if(cv._done)return;cv._done=true;try{cv.toBlob(function(blob){if(!blob){toast('Не получилось');return;}var file=new File([blob],'pulsiq-den.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Мой день в PULSIQ'}).catch(function(){dl(blob);});}else{dl(blob);}},'image/png');}catch(e){toast('Карточка готова, но QR недоступен офлайн');}}
  function dl(blob){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pulsiq-den.png';document.body.appendChild(a);a.click();a.remove();toast('Карточка сохранена');}

  document.querySelectorAll('.ticks').forEach(function(tk){for(var i=0;i<60;i++){var a=i*6*Math.PI/180,r1=i%5===0?40:43,r2=46;var l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',50+r1*Math.sin(a));l.setAttribute('y1',50-r1*Math.cos(a));l.setAttribute('x2',50+r2*Math.sin(a));l.setAttribute('y2',50-r2*Math.cos(a));l.setAttribute('class',i%5===0?'tickM':'tick');tk.appendChild(l);}});
  function clock(){var d=new Date(),sec=d.getSeconds(),m=d.getMinutes(),h=d.getHours();document.querySelectorAll('.sh').forEach(function(e){e.setAttribute('transform','rotate('+(sec*6)+' 50 50)');});document.querySelectorAll('.mh').forEach(function(e){e.setAttribute('transform','rotate('+(m*6+sec*0.1)+' 50 50)');});document.querySelectorAll('.hh').forEach(function(e){e.setAttribute('transform','rotate('+((h%12)*30+m*0.5)+' 50 50)');});}
  document.addEventListener('click',function(){document.querySelectorAll('.csel.open').forEach(function(e){e.classList.remove('open');});});
  clock();setInterval(clock,1000);updateStreak();render();
})();
</script>
